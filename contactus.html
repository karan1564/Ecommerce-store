    <!--  -->

    <div class="product-head product-headcontact">
      <div class="breadcrumbs">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb texty">
            <li class="breadcrumb-item active">Home</li>
            <li class="breadcrumb-item" aria-current="page">Contact</li>
          </ol>
        </nav>
      </div>

      <h1 class="p-h1">Contact Us</h1>
    </div>

    <!-- endbraed -->

    <div class="container-fluid maincontaincontact">
      <div class="row contactrow">
        <div class="col-lg-5 col-md-12 contactusimg">
          
            <img src="img/contact-us-image_optimized.webp" class="img-fluid" />
          
        </div>
        <div class="col-lg-5 col-md-12 contactmaincol">
          <div class="maincontinpdiv">
            <form class="contactusform p-5">
              <h1>Contact With Us</h1>

              <div class="mb-3 contactinp">
                <label for="exampleInputEmail1" class="form-label">Name</label>
                <input
                  type="email"
                  class="form-control"
                  id="exampleInputEmail1"
                  aria-describedby="emailHelp"
                />
              </div>
              <div class="mb-3 contactinp">
                <label for="exampleInputEmail1" class="form-label">Phone</label>
                <input
                  type="email"
                  class="form-control"
                  id="exampleInputEmail1"
                  aria-describedby="emailHelp"
                />
              </div>

              <div class="mb-3 contactinp">
                <label for="exampleInputEmail1" class="form-label"
                  >Email address</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="exampleInputEmail1"
                  aria-describedby="emailHelp"
                />
              </div>

              <div class="mb-3 conttexty">
                <label for="exampleInputEmail1" class="form-label"
                  >Your Message</label
                >
                <textarea
                  class="form-control"
                  aria-label="With textarea"
                ></textarea>
              </div>

              <button type="submit" class="btn btn-primary">
                Send Message
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="new.js"></script>

    <script src="news.js"></script>
